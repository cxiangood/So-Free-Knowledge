logging:
  level: "DEBUG"
  log_file: "logs/sofree.log"

insight:
  env_file: ".env"
  event_types: "im.message.receive_v1"
  compact: false
  output_dir: "outputs/local_pipeline"
  state_dir: "outputs/local_pipeline/state"
  chat_history_path: "outputs/local_pipeline/state/chat_message_store.json"
  chat_history_limit: 100
  context_window_size: 10
  detect_threshold: 40.0
  task_push_enabled: true
  task_push_receive_id_type: "open_id"
  task_push_fallback_receive_id_type: "open_id"
  task_push_bootstrap_on_empty: true
  task_push_bootstrap_max_chats: 200
  step_trace_enabled: true
  rag_enabled: true
  rag_top_k: 5
  rag_min_score: 0.1
  rag_embed_model: "BAAI/bge-large-zh"
  observe_auto_reply_enabled: true

  logging:
    app_name: "INSIGHT"
    quiet: true

  online:
    max_workers: 8

  offline:
    messages_file: "message_archive/20260427T043305Z/messages.jsonl"

  prompt:
    yaml_path: "insight/prompt/prompts.yaml"

  llm:
    detect:
      max_tokens: 64
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    lift:
      max_tokens: 2048
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    route:
      max_tokens: 256
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    observe_qa:
      max_tokens: 64
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    observe_answer:
      max_tokens: 320
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    observe_convert:
      max_tokens: 256
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    observe_merge_convert:
      max_tokens: 320
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
    observe_optimize_card:
      max_tokens: 768
      temperature: 0.0
      top_p: 0.1
      thinking_type: "disabled"
